<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMinYMax meet">
  <!--
    Hero figure: Luffy silhouette doing a Gum-Gum stretch.
    Self-contained & swappable — replace this whole file (or point the
    <img> in index.html at a different asset) to change the character.
    The stretch/punch animation lives here so it travels with the asset.
  -->
  <style>
    .arm-seg{transform-box:fill-box;transform-origin:left center;animation:stretch 3.6s cubic-bezier(.5,0,.2,1) infinite}
    .fist{transform-box:fill-box;transform-origin:center;animation:punch 3.6s cubic-bezier(.5,0,.2,1) infinite}
    .impact{transform-box:fill-box;transform-origin:center;opacity:0;animation:impact 3.6s cubic-bezier(.5,0,.2,1) infinite}
    @keyframes stretch{0%,8%{transform:scaleX(.28)}34%,52%{transform:scaleX(1)}74%,100%{transform:scaleX(.28)}}
    @keyframes punch{0%,8%{transform:translateX(-300px)}34%,52%{transform:translateX(0)}74%,100%{transform:translateX(-300px)}}
    @keyframes impact{0%,30%{opacity:0;transform:scale(.4)}36%{opacity:.9;transform:scale(1)}52%{opacity:.5;transform:scale(1.15)}58%,100%{opacity:0;transform:scale(1.3)}}
    @media (prefers-reduced-motion: reduce){
      .arm-seg,.fist,.impact{animation:none}
      .arm-seg{transform:scaleX(1)} .fist{transform:translateX(0)}
    }
  </style>
  <defs>
    <linearGradient id="sil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0722"/><stop offset="1" stop-color="#040310"/>
    </linearGradient>
  </defs>

  <!-- body -->
  <g fill="url(#sil)">
    <path d="M205 470 L150 668 L205 668 L238 520 Z"/>
    <path d="M250 470 L320 668 L372 668 L292 510 Z"/>
    <path d="M196 350 Q230 332 296 348 L300 478 Q248 500 198 478 Z"/>
    <path d="M205 360 Q150 360 120 408 Q150 400 175 392 Q160 420 150 452 Q186 410 214 388 Z"/>
    <rect x="244" y="300" width="40" height="42" rx="14"/>
    <circle cx="270" cy="288" r="40"/>
    <ellipse cx="272" cy="258" rx="92" ry="20"/>
    <path d="M214 256 Q236 196 272 192 Q308 196 330 256 Z"/>
    <rect x="206" y="252" width="132" height="12" rx="6"/>
  </g>

  <!-- gum-gum stretching arm -->
  <g fill="url(#sil)">
    <rect class="arm-seg" x="288" y="338" width="430" height="34" rx="17"/>
  </g>
  <g class="fist">
    <circle cx="724" cy="355" r="40" fill="url(#sil)"/>
    <circle cx="700" cy="338" r="15" fill="url(#sil)"/>
    <g class="impact" transform="translate(770 355)">
      <path d="M0 -64 L13 -20 L58 -28 L24 4 L52 44 L6 28 L-6 70 L-20 26 L-64 38 L-30 0 L-58 -40 L-10 -22 Z"
            fill="none" stroke="#cdbcff" stroke-width="6" opacity=".9"/>
    </g>
  </g>
</svg>
